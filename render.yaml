services:
  - type: web
    name: zaplead-website
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: sh -c 'npm start -- --hostname 0.0.0.0 --port ${PORT}'
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONTACT_WEBHOOK_URL
        sync: false
